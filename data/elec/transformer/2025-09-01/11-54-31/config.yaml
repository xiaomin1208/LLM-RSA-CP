optimizer:
  name: Adam
  hparams:
    lr: 0.003
    weight_decay: 0.0
lr_scheduler:
  name: ReduceLROnPlateau
  hparams:
    monitor: val_loss
    mode: min
    factor: 0.5
    patience: 5
    threshold: 0.0001
    threshold_mode: abs
    min_lr: 1.0e-06
dataset:
  name: elec
  connectivity:
    method: identity
    threshold: 0.1
    include_self: false
    layout: edge_index
  splitting:
    method: temporal
    val_len: 0.4
    test_len: 0.2
window: 6
horizon: 1
stride: 1
delay: 6
scale_target: true
add_exogenous: true
model:
  name: transformer
  hparams:
    hidden_size: 32
    ff_size: 64
    n_heads: 2
    n_layers: 3
    dropout: 0.1
workers: 0
num_threads: 1
epochs: 200
train_batches: 100
patience: 50
batch_size: 32
grad_clip_val: 5
apply_scaler: true
scale_axis: graph
save_outputs: true
run:
  seed: 759121849
  name: 2025-09-01_11-54-31_759121849
